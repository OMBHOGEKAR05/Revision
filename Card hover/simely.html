<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smiley face</title>
    <style>
        #face {
            background-color: orange;
            height: 400px;
            width: 400px;
            border-radius: 400px;
            position: relative;
        }
        .eyes{
            background-color: black;
            height: 75px;
            width: 75px;
            border-radius: 75px;
            position: absolute;
        }
        #left{
            top: 100px;
            left: 100px;
        }
        #right{
            top: 100px;
            left: 250px;
        }
        #mouth{
            position: absolute;
            background-color: brown;
            height: 50px;
            width: 100px;
            top: 250px;
            left: 170px;
            border-radius: 0 0 15px 15px;
        }
    </style>
</head>

<body>
    <div id="face">
            <div class = "eyes" id="left"></div>
            <div class = "eyes" id="right"></div>
            <div id="mouth"></div>
    </div>
</body>

</html>
