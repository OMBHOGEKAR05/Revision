<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form</title>
  </head>
  <body>
    <form action="/server">
      <h2>Feedback Form</h2>
      <div>
        <label for="name">Name :</label>
        <input
          type="text"
          placeholder="Enter your name..."
          name="name"
          id="name"
        />
      </div>
      &nbsp; &nbsp; &nbsp;
      <div>
        <label for="email">Email : </label>
        <input
          type="text"
          placeholder="Enter your email"
          name="email"
          id="email"
        />
      </div>
      &nbsp; &nbsp; &nbsp;
      <div><label for="msg">Message :</label></div>
      <textarea name="msg" id="msg" cols="30" rows="4"></textarea>
      <br>
      <div>
        <label for="rating">Rate us out of 5 :</label> <br>
        <input type="radio" id="one" name="rate" value="1"/>
        <label for="one">1</label> <br>
        <input type="radio" id="two" name="rate" value="2" />
        <label for="two">2</label> <br>
        <input type="radio" id="three" name="rate" value="3"/>
        <label for="three">3</label> <br>
        <input type="radio" id="four" name="rate" value="4"/>
        <label for="four">4</label> <br>
        <input type="radio" id="five" name="rate" value="5"/>
        <label for="five">5</label> <br>
      </div>
    <br>
    <button>Send your Message!!</button>
    </form>
  </body>
</html>
